<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agency — Think. Build. Scale.</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<!-- ============================================
     INLINE STYLES (order: variables → global → sections → effects)
     ============================================ -->
<style>
/* ============ VARIABLES ============ */
:root {
  --bg-primary: #08081a;
  --text-primary: #fff;
  --text-muted: rgba(255,255,255,0.55);
  --text-dim: rgba(255,255,255,0.35);
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --card-hover-bg: rgba(255,255,255,0.05);
  --card-hover-border: rgba(255,255,255,0.12);
  --gradient-pink: rgb(232,83,242);
  --gradient-cyan: rgb(0,197,230);
  --gradient-blue: rgb(29,99,255);
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
}

/* ============ GLOBAL ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  overscroll-behavior: none;
  /* scroll-behavior handled by fullpage.js via GSAP ScrollToPlugin */
}

body {
  background: #08081a;
  color: #fff;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
}

/* ============ HEADER ============ */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.4rem 4%;
  pointer-events: none; /* allow clicks through to content */
}

.site-header * {
  pointer-events: auto;
}

/* Left: logo + status */
.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.header-logo {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 1.6rem;
  font-style: italic;
  line-height: 1;
  opacity: 0;
  transform: translateY(-20px);
}

.header-status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  opacity: 0;
  transform: translateX(-15px);
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00e87b;
  box-shadow: 0 0 8px rgba(0,232,123,0.6);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0,232,123,0.6); }
 5
